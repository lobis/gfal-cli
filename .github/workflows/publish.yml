name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install build dependencies
      run: python -m pip install build hatchling hatch-vcs

    - name: Build sdist and wheel
      run: python -m build

    - name: Store distributions
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  build-rpm:
    name: Build RPM 📦 (${{ matrix.os.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - image: almalinux:9
            name: el9
          - image: almalinux:10
            name: el10
    container: ${{ matrix.os.image }}

    steps:
    - name: Install git
      run: dnf install -y git

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        dnf install -y rpm-build make python3-devel python3-pip
        git config --global --add safe.directory '*'
        python3 -m pip install build hatchling hatch-vcs

    - name: Build RPM
      run: make rpm

    - name: Store RPMs
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-distributions-${{ matrix.os.name }}
        path: rpmbuild/RPMS/*/*.rpm

    - name: Store SRPMs
      uses: actions/upload-artifact@v7
      with:
        name: srpm-package-distributions-${{ matrix.os.name }}
        path: rpmbuild/SRPMS/*.src.rpm

  build-deb:
    name: Build DEB 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev build-essential
        sudo gem install fpm
        python -m pip install build hatchling hatch-vcs

    - name: Build distributions
      run: python -m build

    - name: Build DEB
      run: |
        VERSION=$(python3 -m hatchling version | sed 's/\+.*//')

        # 1. Create a fake root filesystem targeting Debian's expected paths
        mkdir -p buildroot/usr/lib/python3/dist-packages
        mkdir -p buildroot/usr/bin

        # 2. Bundle fsspec-xrootd and your app directly into dist-packages
        python3 -m pip install fsspec-xrootd --no-deps --ignore-installed --target buildroot/usr/lib/python3/dist-packages
        python3 -m pip install dist/gfal_cli-*.whl --no-deps --ignore-installed --target buildroot/usr/lib/python3/dist-packages

        # 3. Move the CLI scripts to /usr/bin where they belong
        mv buildroot/usr/lib/python3/dist-packages/bin/* buildroot/usr/bin/
        rm -rf buildroot/usr/lib/python3/dist-packages/bin

        # Fix shebangs to use the target system's Python instead of the GitHub Actions runner Python
        sed -i '1s|^.*$|#!/usr/bin/python3|' buildroot/usr/bin/*

        # 4. Package the raw directory using fpm
        fpm -s dir -t deb \
          --name python3-gfal-cli \
          --version "$VERSION" \
          --architecture all \
          --depends "python3-fsspec" \
          --depends "python3-xrootd" \
          --depends "python3-aiohttp" \
          --depends "python3-requests" \
          --description "GFAL2-compatible CLI tools based on fsspec" \
          -C buildroot \
          usr/

    - name: Store DEBs
      uses: actions/upload-artifact@v7
      with:
        name: deb-package-distributions
        path: "*.deb"

  test-install:
    name: Test Install 🧪 (${{ matrix.target.name }})
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: AlmaLinux 9
            container: almalinux:9
            artifact: rpm-package-distributions-el9
            install_cmd: dnf install -y epel-release && find . -name "*.rpm" -exec dnf install -y {} +
          - name: AlmaLinux 10
            container: almalinux:10
            artifact: rpm-package-distributions-el10
            install_cmd: dnf install -y epel-release && find . -name "*.rpm" -exec dnf install -y {} +
          - name: Ubuntu 24.04
            container: ubuntu:24.04
            artifact: deb-package-distributions
            install_cmd: apt-get update && DEBIAN_FRONTEND=noninteractive find . -name "*.deb" -exec apt-get install -y {} +

    container: ${{ matrix.target.container }}

    steps:
    - name: Download package
      uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.target.artifact }}

    - name: Install package
      run: ${{ matrix.target.install_cmd }}

    - name: Verify executables exist and run
      run: |
        echo "✅ Verifying installation..."
        command -v gfal-copy
        gfal-copy --help

  publish-to-pypi:
    name: Publish to PyPI 🚀
    needs: [build, build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfal-cli
    permissions:
      id-token: write

    steps:
    - name: Download distributions
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  update-repo:
    name: Update YUM/APT Repository 🌐
    needs: [build-rpm, build-deb, test-install]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true

    - name: Install repository tools
      run: |
        sudo apt-get update
        sudo apt-get install -y createrepo-c apt-utils

    - name: Prepare and Update Repository
      run: |
        mkdir -p repo/rpm/el9/x86_64 repo/rpm/el10/x86_64
        mkdir -p repo/deb/pool/main/g/gfal-cli
        mkdir -p repo/deb/dists/stable/main/binary-amd64

        # Copy RPMs
        find artifacts/ -type f -name "*el9*.rpm" ! -name "*.src.rpm" -exec cp {} repo/rpm/el9/x86_64/ \;
        find artifacts/ -type f -name "*el10*.rpm" ! -name "*.src.rpm" -exec cp {} repo/rpm/el10/x86_64/ \;

        # Generate YUM metadata
        createrepo_c repo/rpm/el9/x86_64/
        createrepo_c repo/rpm/el10/x86_64/

        # Copy DEBs
        cp artifacts/*.deb repo/deb/pool/main/g/gfal-cli/

        # Generate APT metadata
        cd repo/deb
        apt-ftparchive packages pool/main/g/gfal-cli > dists/stable/main/binary-amd64/Packages
        gzip -c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
        apt-ftparchive release dists/stable > dists/stable/Release
        cd ../..

        # Generate the .repo file for easier installation
        cat <<EOF > repo/rpm/gfal-cli.repo
        [gfal-cli]
        name=gfal-cli repository
        baseurl=https://lobis.github.io/gfal-cli/rpm/el\$releasever/\$basearch/
        enabled=1
        gpgcheck=0
        EOF

    - name: List Repository Contents 📂
      run: ls -R repo/

    - name: Upload Pages Artifact 📦
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./repo/

    - name: Deploy to GitHub Pages 🚀
      id: deployment
      uses: actions/deploy-pages@v4

  github-release:
    name: Create GitHub Release 🚀
    needs: [build, build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true

    - name: List artifacts
      run: ls -R artifacts/

    - name: Create latest aliases
      run: |
        cd artifacts
        # Find the actual packages and create 'latest' copies
        # RPMs (EL9, EL10)
        find . -name "*el9*.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el9.rpm \;
        find . -name "*el10*.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el10.rpm \;
        # DEB
        find . -name "*.deb" -exec cp {} python3-gfal-cli-latest.deb \;
        echo "Created latest aliases:"
        ls -l python3-gfal-cli-latest*

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true

  verify-deployment:
    name: Verify Deployment 🔍 (${{ matrix.target.name }})
    needs: [update-repo, publish-to-pypi, github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: AlmaLinux 9
            container: almalinux:9
            install_cmd: |
              dnf install -y epel-release
              curl -sL -o /etc/yum.repos.d/gfal-cli.repo https://lobis.github.io/gfal-cli/rpm/gfal-cli.repo
              for i in {1..12}; do
                echo "Attempt $i..."
                dnf clean all
                if dnf install -y python3-gfal-cli; then
                  break
                fi
                sleep 10
              done
          - name: AlmaLinux 10
            container: almalinux:10
            install_cmd: |
              dnf install -y epel-release
              curl -sL -o /etc/yum.repos.d/gfal-cli.repo https://lobis.github.io/gfal-cli/rpm/gfal-cli.repo
              for i in {1..12}; do
                echo "Attempt $i..."
                dnf clean all
                if dnf install -y python3-gfal-cli; then
                  break
                fi
                sleep 10
              done
          - name: Ubuntu 24.04
            container: ubuntu:24.04
            install_cmd: |
              apt-get update && apt-get install -y curl
              echo "deb [trusted=yes] https://lobis.github.io/gfal-cli/deb/ stable main" | tee /etc/apt/sources.list.d/gfal-cli.list
              for i in {1..12}; do
                echo "Attempt $i..."
                if apt-get update && apt-get install -y python3-gfal-cli; then
                  break
                fi
                sleep 10
              done
          - name: PyPI
            container: python:3.9
            install_cmd: |
              for i in {1..12}; do
                echo "Attempt $i..."
                if pip install --no-cache-dir gfal-cli; then
                  break
                fi
                sleep 10
              done

    container: ${{ matrix.target.container }}

    steps:
    - name: Install and Verify
      run: |
        ${{ matrix.target.install_cmd }}

        echo "✅ Verifying installation..."
        # Command should be available
        # On Linux OS packages, the binary is gfal-copy etc.
        # Check if gfal-copy is in path
        export PATH=$PATH:/usr/local/bin
        command -v gfal-copy || exit 1

        INSTALLED_VERSION=$(gfal-copy --version | awk '{print $NF}')
        EXPECTED_VERSION=${{ github.ref_name }}
        EXPECTED_VERSION=${EXPECTED_VERSION#v}

        echo "Installed version: $INSTALLED_VERSION"
        echo "Expected version: $EXPECTED_VERSION"

        if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
          echo "❌ Version mismatch!"
          exit 1
        fi
        echo "✅ Version verification PASSED!"
