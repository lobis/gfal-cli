name: Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install build dependencies
      run: python -m pip install build hatchling hatch-vcs

    - name: Build sdist and wheel
      run: python -m build

    - name: Store distributions
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  build-rpm:
    name: Build RPM 📦 (${{ matrix.os.name }}) [${{ matrix.arch }}]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - image: almalinux:9
            name: el9
          - image: almalinux:10
            name: el10
        arch: [x86_64, aarch64]

    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Build RPM in Container
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ${{ matrix.os.image }} \
          bash -c "dnf install -y git rpm-build make python3-devel python3-pip && \
                   git config --global --add safe.directory '*' && \
                   python3 -m pip install build hatchling hatch-vcs && \
                   make rpm"

    - name: Store RPMs
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-distributions-${{ matrix.os.name }}-${{ matrix.arch }}
        path: rpmbuild/RPMS/*/*.rpm

    - name: Store SRPMs
      uses: actions/upload-artifact@v7
      with:
        name: srpm-package-distributions-${{ matrix.os.name }}-${{ matrix.arch }}
        path: rpmbuild/SRPMS/*.src.rpm

  build-deb:
    name: Build DEB 📦 [${{ matrix.arch }}]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Build DEB in Container
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch == 'amd64' && 'amd64' || 'arm64' }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:22.04 \
          bash -c "apt-get update && \
                   DEBIAN_FRONTEND=noninteractive apt-get install -y ruby ruby-dev build-essential python3-pip git && \
                   gem install --no-document fpm && \
                   python3 -m pip install build hatchling hatch-vcs && \
                   VERSION=\$(python3 -m hatchling version | sed 's/\+.*//') && \
                   python3 -m build --no-isolation && \
                   mkdir -p buildroot/usr/lib/python3/dist-packages && \
                   mkdir -p buildroot/usr/bin && \
                   python3 -m pip install fsspec-xrootd --no-deps --ignore-installed --target buildroot/usr/lib/python3/dist-packages && \
                   python3 -m pip install dist/gfal_cli-*.whl --no-deps --ignore-installed --target buildroot/usr/lib/python3/dist-packages && \
                   mv buildroot/usr/lib/python3/dist-packages/bin/* buildroot/usr/bin/ && \
                   rm -rf buildroot/usr/lib/python3/dist-packages/bin && \
                   sed -i '1s|^.*$|#!/usr/bin/python3|' buildroot/usr/bin/* && \
                   fpm -s dir -t deb \
                     --name python3-gfal-cli \
                     --version \"\$VERSION\" \
                     --architecture ${{ matrix.arch }} \
                     --depends \"python3-fsspec\" \
                     --depends \"python3-xrootd\" \
                     --depends \"python3-aiohttp\" \
                     --depends \"python3-requests\" \
                     --description \"GFAL2-compatible CLI tools based on fsspec\" \
                     -C buildroot \
                     -p python3-gfal-cli-\$VERSION-${{ matrix.arch }}.deb \
                     usr/"

    - name: Store DEBs
      uses: actions/upload-artifact@v7
      with:
        name: deb-package-distributions-${{ matrix.arch }}
        path: "*.deb"

  test-install:
    name: Test Install 🧪 (${{ matrix.target.name }})
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: AlmaLinux 9
            container: almalinux:9
            artifact: rpm-package-distributions-el9
            install_cmd: dnf install -y epel-release && find . -name "*.rpm" -exec dnf install -y {} +
          - name: AlmaLinux 10
            container: almalinux:10
            artifact: rpm-package-distributions-el10
            install_cmd: dnf install -y epel-release && find . -name "*.rpm" -exec dnf install -y {} +
          - name: Ubuntu 24.04
            container: ubuntu:24.04
            artifact: deb-package-distributions
            install_cmd: apt-get update && DEBIAN_FRONTEND=noninteractive find . -name "*.deb" -exec apt-get install -y {} +

    container: ${{ matrix.target.container }}

    steps:
    - name: Download package
      uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.target.artifact }}

    - name: Install package
      run: ${{ matrix.target.install_cmd }}

    - name: Verify executables exist and run
      run: |
        echo "✅ Verifying installation..."
        command -v gfal-copy
        gfal-copy --help

  publish-to-pypi:
    name: Publish to PyPI 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfal-cli
    permissions:
      id-token: write

    steps:
    - name: Download distributions
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  update-repo:
    name: Update YUM/APT Repository 🌐
    needs: [build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true

    - name: Install repository and docs tools
      run: |
        sudo apt-get update
        sudo apt-get install -y createrepo-c apt-utils
        pip install mkdocs-material

    - name: Build Documentation 📚
      run: mkdocs build

    - name: Prepare and Update Repository
      run: |
        # The MkDocs website is in 'site/'
        # We'll put our repository into 'site/rpm' and 'site/deb'
        mkdir -p site/rpm/el9/x86_64 site/rpm/el9/aarch64
        mkdir -p site/rpm/el10/x86_64 site/rpm/el10/aarch64
        mkdir -p site/deb/pool/main/g/gfal-cli
        mkdir -p site/deb/dists/stable/main/binary-amd64 site/deb/dists/stable/main/binary-arm64

        # Copy RPMs
        find artifacts/ -type f -name "*el9*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/ -type f -name "*el9*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/ -type f -name "*el10*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/ -type f -name "*el10*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        # Generate YUM metadata
        createrepo_c site/rpm/el9/x86_64/
        createrepo_c site/rpm/el9/aarch64/
        createrepo_c site/rpm/el10/x86_64/
        createrepo_c site/rpm/el10/aarch64/

        # Copy DEBs
        cp artifacts/*.deb site/deb/pool/main/g/gfal-cli/

        # Generate APT metadata
        cd site/deb
        apt-ftparchive packages pool/main/g/gfal-cli --arch amd64 > dists/stable/main/binary-amd64/Packages
        gzip -c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
        apt-ftparchive packages pool/main/g/gfal-cli --arch arm64 > dists/stable/main/binary-arm64/Packages
        gzip -c dists/stable/main/binary-arm64/Packages > dists/stable/main/binary-arm64/Packages.gz
        apt-ftparchive release dists/stable > dists/stable/Release
        cd ../..

        # Generate the .repo file for easier installation
        cat <<EOF > site/rpm/gfal-cli.repo
        [gfal-cli]
        name=gfal-cli repository
        baseurl=https://lobis.github.io/gfal-cli/rpm/el\$releasever/\$basearch/
        enabled=1
        gpgcheck=0
        EOF

    - name: List Site Contents 📂
      run: ls -R site/

    - name: Upload Pages Artifact 📦
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./site/

    - name: Deploy to GitHub Pages 🚀
      id: deployment
      uses: actions/deploy-pages@v4

  github-release:
    name: Create GitHub Release 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true

    - name: List artifacts
      run: ls -R artifacts/

    - name: Create latest aliases
      run: |
        cd artifacts
        # Find the actual packages and create 'latest' copies
        # RPMs (EL9, EL10) - Default to x86_64 for generic names
        find . -name "*el9*x86_64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el9.rpm \;
        find . -name "*el10*x86_64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el10.rpm \;
        # RPM ARM aliases
        find . -name "*el9*aarch64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el9-aarch64.rpm \;
        find . -name "*el10*aarch64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el10-aarch64.rpm \;
        # DEB (Default to amd64 for generic name)
        find . -name "*amd64.deb" -exec cp {} python3-gfal-cli-latest.deb \;
        # DEB ARM alias
        find . -name "*arm64.deb" -exec cp {} python3-gfal-cli-latest-arm64.deb \;
        echo "Created latest aliases:"
        ls -l python3-gfal-cli-latest*

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true

  verify-deployment:
    name: Verify Deployment 🔍 (${{ matrix.target.name }})
    needs: [update-repo, publish-to-pypi, github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: AlmaLinux 9
            container: almalinux:9
            install_cmd: |
              dnf install -y epel-release
              curl -sL -o /etc/yum.repos.d/gfal-cli.repo https://lobis.github.io/gfal-cli/rpm/gfal-cli.repo
              for i in {1..12}; do
                echo "Attempt $i..."
                dnf clean all
                if dnf install -y python3-gfal-cli; then
                  break
                fi
                sleep 10
              done
          - name: AlmaLinux 10
            container: almalinux:10
            install_cmd: |
              dnf install -y epel-release
              curl -sL -o /etc/yum.repos.d/gfal-cli.repo https://lobis.github.io/gfal-cli/rpm/gfal-cli.repo
              for i in {1..12}; do
                echo "Attempt $i..."
                dnf clean all
                if dnf install -y python3-gfal-cli; then
                  break
                fi
                sleep 10
              done
          - name: Ubuntu 24.04
            container: ubuntu:24.04
            install_cmd: |
              apt-get update && apt-get install -y curl
              echo "deb [trusted=yes] https://lobis.github.io/gfal-cli/deb/ stable main" | tee /etc/apt/sources.list.d/gfal-cli.list
              for i in {1..12}; do
                echo "Attempt $i..."
                if apt-get update && apt-get install -y python3-gfal-cli; then
                  break
                fi
                sleep 10
              done
          - name: PyPI
            container: python:3.9
            install_cmd: |
              for i in {1..12}; do
                echo "Attempt $i..."
                if pip install --no-cache-dir gfal-cli; then
                  break
                fi
                sleep 10
              done

    container: ${{ matrix.target.container }}

    steps:
    - name: Install and Verify
      run: |
        ${{ matrix.target.install_cmd }}

        echo "✅ Verifying installation..."
        # Command should be available
        # On Linux OS packages, the binary is gfal-copy etc.
        # Check if gfal-copy is in path
        export PATH=$PATH:/usr/local/bin
        command -v gfal-copy || exit 1

        INSTALLED_VERSION=$(gfal-copy --version | awk '{print $NF}')
        EXPECTED_VERSION=${{ github.ref_name }}
        EXPECTED_VERSION=${EXPECTED_VERSION#v}

        echo "Installed version: $INSTALLED_VERSION"
        echo "Expected version: $EXPECTED_VERSION"

        if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
          echo "❌ Version mismatch!"
          exit 1
        fi
        echo "✅ Version verification PASSED!"
