name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests & Linting
  # ---------------------------------------------------------------------------

  codespell:
    name: Codespell spell-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: codespell-project/actions-codespell@v2
      with:
        ignore_words_list: cern,xrootd,fsspec,gfal,adler,aiohttp,thirdparty,scitag

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1

  tests:
    name: Tests (${{ matrix.os }}, Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13" ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package and test dependencies
      run: pip install --no-cache-dir ".[dev]"
    - name: Run unit and functional tests
      run: pytest tests/ -v -m "not integration and not xrootd"

  xrootd:
    name: XRootD Server Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install system build dependencies
      run: sudo apt-get update && sudo apt-get install -y uuid-dev openssl
    - name: Install package and test dependencies (with XRootD)
      run: pip install --no-cache-dir ".[dev]"
    - name: Override fsspec-xrootd with gfal3-updates branch
      run: pip install "git+https://github.com/scikit-hep/fsspec-xrootd.git@gfal3-updates"
    - name: Run local XRootD server tests
      run: pytest tests/ -v -m xrootd

  integration:
    name: Integration Tests (EOS)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install system build dependencies
      run: sudo apt-get update && sudo apt-get install -y uuid-dev
    - name: Install CERN CA certificate
      run: |
        wget -q "https://cafiles.cern.ch/cafiles/certificates/CERN%20Root%20Certification%20Authority%202.crt" -O /tmp/cern.der
        openssl x509 -inform DER -in /tmp/cern.der -out /tmp/cern.crt
        sudo cp /tmp/cern.crt /usr/local/share/ca-certificates/cern-root-ca-2.crt
        sudo update-ca-certificates
        echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
        echo "REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
    - name: Install package and test dependencies
      run: pip install --no-cache-dir ".[dev]"
    - name: Override fsspec-xrootd with gfal3-updates
      run: pip install "git+https://github.com/scikit-hep/fsspec-xrootd.git@gfal3-updates"
    - name: Run integration tests
      run: pytest tests/ -v -m integration

  # ---------------------------------------------------------------------------
  # 2. Packaging
  # ---------------------------------------------------------------------------

  build:
    name: Build distribution 📦
    needs: [codespell, pre-commit, tests, xrootd, integration]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install build dependencies
      run: python -m pip install build hatchling hatch-vcs
    - name: Build sdist and wheel
      run: python -m build
    - name: Store distributions
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  build-rpm:
    name: Build RPM 📦 (${{ matrix.os.name }}) [${{ matrix.arch }}]
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - image: almalinux:9
            name: el9
          - image: almalinux:10
            name: el10
        arch: [x86_64, aarch64]
    steps:
    - name: Set up QEMU
      if: matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v4
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Build RPM in Container
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
          -v ${{ github.workspace }}:/workspace -w /workspace \
          ${{ matrix.os.image }} \
          bash -c "dnf install -y git rpm-build make python3-devel python3-pip && \
                   git config --global --add safe.directory '*' && \
                   python3 -m pip install build hatchling hatch-vcs && \
                   make rpm"
    - name: Store RPMs
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-distributions-${{ matrix.os.name }}-${{ matrix.arch }}
        path: rpmbuild/RPMS/*/*.rpm

  build-deb:
    name: Build DEB 📦 [${{ matrix.arch }}]
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
    - name: Set up QEMU
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v4
    - uses: actions/checkout@v6
    - name: Build DEB (Native dpkg-deb)
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch }} \
          -v ${{ github.workspace }}:/workspace -w /workspace \
          ubuntu:22.04 \
          bash -c "apt-get update && \
                   DEBIAN_FRONTEND=noninteractive apt-get install -y python3-pip git python3-all binutils && \
                   python3 -m pip install build hatchling hatch-vcs && \
                   VERSION=\$(python3 -m hatchling version | sed 's/\+.*//') && \
                   python3 -m build --no-isolation && \
                   mkdir -p pkg/DEBIAN pkg/usr/bin pkg/usr/lib/python3/dist-packages && \
                   cat <<EOF > pkg/DEBIAN/control
        Package: python3-gfal-cli
        Version: \$VERSION
        Section: utils
        Priority: optional
        Architecture: ${{ matrix.arch }}
        Maintainer: Lobis <lobis@cern.ch>
        Depends: python3, python3-fsspec, python3-xrootd, python3-aiohttp, python3-requests
        Description: GFAL2-compatible CLI tools based on fsspec
        EOF
                   python3 -m pip install fsspec-xrootd dist/gfal_cli-*.whl --no-deps --ignore-installed --target pkg/usr/lib/python3/dist-packages && \
                   mv pkg/usr/lib/python3/dist-packages/bin/* pkg/usr/bin/ && \
                   rm -rf pkg/usr/lib/python3/dist-packages/bin && \
                   sed -i '1s|^.*$|#!/usr/bin/python3|' pkg/usr/bin/gfal* && \
                   dpkg-deb --build pkg python3-gfal-cli-\$VERSION-${{ matrix.arch }}.deb"
    - name: Store DEBs
      uses: actions/upload-artifact@v7
      with:
        name: deb-package-distributions-${{ matrix.arch }}
        path: "*.deb"

  # ---------------------------------------------------------------------------
  # 3. Validation & Repository Update
  # ---------------------------------------------------------------------------

  test-install:
    name: Test Install 🧪 (${{ matrix.target.name }})
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: AlmaLinux 9
            container: almalinux:9
            artifact: rpm-package-distributions-el9-x86_64
            install_cmd: dnf install -y epel-release && find . -name "*.rpm" -exec dnf install -y {} +
          - name: AlmaLinux 10
            container: almalinux:10
            artifact: rpm-package-distributions-el10-x86_64
            install_cmd: dnf install -y epel-release && find . -name "*.rpm" -exec dnf install -y {} +
          - name: Ubuntu 24.04
            container: ubuntu:24.04
            artifact: deb-package-distributions-amd64
            install_cmd: apt-get update && DEBIAN_FRONTEND=noninteractive find . -name "*.deb" -exec apt-get install -y {} +
    container: ${{ matrix.target.container }}
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.target.artifact }}
    - name: Install package
      run: ${{ matrix.target.install_cmd }}
    - name: Verify executables
      run: |
        command -v gfal-copy
        gfal-copy --help

  update-repo:
    name: Update YUM/APT Repository 🌐
    needs: [build-rpm, build-deb, test-install]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true
    - name: Install tools
      run: |
        sudo apt-get update && sudo apt-get install -y createrepo-c apt-utils
        pip install mkdocs-material
    - name: Build Docs 📚
      run: mkdocs build
    - name: Prepare Repository
      run: |
        mkdir -p site/rpm/el9/x86_64 site/rpm/el9/aarch64 site/rpm/el10/x86_64 site/rpm/el10/aarch64
        mkdir -p site/deb/pool/main/g/gfal-cli site/deb/dists/stable/main/binary-amd64 site/deb/dists/stable/main/binary-arm64

        find artifacts/ -name "*el9*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/ -name "*el9*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/ -name "*el10*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/ -name "*el10*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;
        for d in site/rpm/el*/*/; do createrepo_c "$d"; done

        cp artifacts/*.deb site/deb/pool/main/g/gfal-cli/
        cd site/deb
        for arch in amd64 arm64; do
          apt-ftparchive packages pool/main/g/gfal-cli --arch $arch > dists/stable/main/binary-$arch/Packages
          gzip -c dists/stable/main/binary-$arch/Packages > dists/stable/main/binary-$arch/Packages.gz
        done
        apt-ftparchive release dists/stable > dists/stable/Release
        cd ../..

        cat <<EOF > site/rpm/gfal-cli.repo
        [gfal-cli]
        name=gfal-cli repository
        baseurl=https://lobis.github.io/gfal-cli/rpm/el\$releasever/\$basearch/
        enabled=1
        gpgcheck=0
        EOF
    - uses: actions/upload-pages-artifact@v3
      with:
        path: ./site/
    - uses: actions/deploy-pages@v4
      id: deployment

  publish-to-pypi:
    name: Publish to PyPI 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfal-cli
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-rpm, build-deb, test-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true
    - name: Create latest aliases
      run: |
        cd artifacts
        find . -name "*el9*x86_64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el9.rpm \;
        find . -name "*el10*x86_64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el10.rpm \;
        find . -name "*el9*aarch64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el9-aarch64.rpm \;
        find . -name "*el10*aarch64.rpm" -not -name "*.src.rpm" -exec cp {} python3-gfal-cli-latest-el10-aarch64.rpm \;
        find . -name "*amd64.deb" -exec cp {} python3-gfal-cli-latest.deb \;
        find . -name "*arm64.deb" -exec cp {} python3-gfal-cli-latest-arm64.deb \;
    - uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true

  verify-deployment:
    name: Verify Deployment 🔍 (${{ matrix.target.name }})
    needs: [update-repo, publish-to-pypi, github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: AlmaLinux 9
            container: almalinux:9
            install_cmd: |
              dnf install -y epel-release curl
              curl -sL -o /etc/yum.repos.d/gfal-cli.repo https://lobis.github.io/gfal-cli/rpm/gfal-cli.repo
              for i in {1..12}; do dnf clean all && dnf install -y python3-gfal-cli && break || sleep 10; done
          - name: AlmaLinux 10
            container: almalinux:10
            install_cmd: |
              dnf install -y epel-release curl
              curl -sL -o /etc/yum.repos.d/gfal-cli.repo https://lobis.github.io/gfal-cli/rpm/gfal-cli.repo
              for i in {1..12}; do dnf clean all && dnf install -y python3-gfal-cli && break || sleep 10; done
          - name: Ubuntu 24.04
            container: ubuntu:24.04
            install_cmd: |
              apt-get update && apt-get install -y curl
              echo "deb [trusted=yes] https://lobis.github.io/gfal-cli/deb/ stable main" | tee /etc/apt/sources.list.d/gfal-cli.list
              for i in {1..12}; do apt-get update && apt-get install -y python3-gfal-cli && break || sleep 10; done
          - name: PyPI
            container: python:3.9
            install_cmd: |
              for i in {1..12}; do pip install --no-cache-dir gfal-cli && break || sleep 10; done
    container: ${{ matrix.target.container }}
    steps:
    - name: Install and Verify
      run: |
        ${{ matrix.target.install_cmd }}
        export PATH=$PATH:/usr/local/bin
        command -v gfal-copy || exit 1
        INSTALLED_VERSION=$(gfal-copy --version | awk '{print $NF}')
        EXPECTED_VERSION=${{ github.ref_name }}
        EXPECTED_VERSION=${EXPECTED_VERSION#v}
        if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
          echo "❌ Version mismatch: $INSTALLED_VERSION != $EXPECTED_VERSION"
          exit 1
        fi
