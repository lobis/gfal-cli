name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: codespell-project/actions-codespell@v2
      with:
        ignore_words_list: cern,xrootd,fsspec,gfal,adler,aiohttp,thirdparty

  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: pip install --no-cache-dir ".[dev]"

    - name: Run unit and functional tests
      run: pytest tests/ -v -m "not integration"

  xrootd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install system build dependencies
      run: sudo apt-get update && sudo apt-get install -y uuid-dev openssl

    - name: Install package and test dependencies (with XRootD)
      run: pip install --no-cache-dir ".[dev,xrootd]"

    - name: Override fsspec-xrootd with gfal3-updates branch (pending merge)
      run: pip install "git+https://github.com/scikit-hep/fsspec-xrootd.git@gfal3-updates"

    - name: Run local XRootD server tests
      run: pytest tests/ -v -m xrootd

  integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install system build dependencies
      run: sudo apt-get update && sudo apt-get install -y uuid-dev

    - name: Install CERN CA certificate
      run: |
        # CERN Root CA 2 is distributed in DER format; convert to PEM for the system store.
        wget -q "https://cafiles.cern.ch/cafiles/certificates/CERN%20Root%20Certification%20Authority%202.crt" \
          -O /tmp/cern-root-ca.der
        openssl x509 -inform DER -in /tmp/cern-root-ca.der -out /tmp/cern-root-ca-2.crt
        sudo cp /tmp/cern-root-ca-2.crt /usr/local/share/ca-certificates/cern-root-ca-2.crt
        sudo update-ca-certificates
        # Point requests and aiohttp at the updated system bundle.
        echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
        echo "REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"

    - name: Install package and test dependencies (with XRootD)
      run: pip install --no-cache-dir ".[dev,xrootd]"

    - name: Override fsspec-xrootd with gfal3-updates branch (pending merge)
      run: pip install "git+https://github.com/scikit-hep/fsspec-xrootd.git@gfal3-updates"

    - name: Run integration tests (eospublic.cern.ch)
      run: pytest tests/ -v -m integration
