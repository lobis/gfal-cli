name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: pip install ".[dev]"

    - name: Run unit and functional tests
      run: pytest tests/ -v -m "not integration"

  integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install CERN CA certificate
      run: |
        # CERN Root CA 2 is distributed in DER format; convert to PEM for the system store.
        wget -q "https://cafiles.cern.ch/cafiles/certificates/CERN%20Root%20Certification%20Authority%202.crt" \
          -O /tmp/cern-root-ca.der
        openssl x509 -inform DER -in /tmp/cern-root-ca.der -out /tmp/cern-root-ca-2.crt
        sudo cp /tmp/cern-root-ca-2.crt /usr/local/share/ca-certificates/cern-root-ca-2.crt
        sudo update-ca-certificates
        # Point requests and aiohttp at the updated system bundle.
        echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
        echo "REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"

    - name: Install package and test dependencies
      run: pip install ".[dev]"

    - name: Run integration tests (eospublic.cern.ch)
      run: pytest tests/ -v -m integration
